# tli_departure_config.yaml

spice:
  kernels:
    - "naif0012.tls"
    - "de430.bsp"

files:
  constants_yaml: "constants.yaml"
  lpf_orbit_csv: "LPF_orbit_2.csv"
  output_dir: "transfer/tli_departure_output"

target:
  target_index: 140000
  time_column: "Time"
  state_columns_geo_eme:
    - "GEO_EME_X_(km)"
    - "GEO_EME_Y_(km)"
    - "GEO_EME_Z_(km)"
    - "GEO_EME_Vx_(km/s)"
    - "GEO_EME_Vy_(km/s)"
    - "GEO_EME_Vz_(km/s)"

epoch:
  tof_days: 90.0

injection:
  boundary_type: "post_tli_cislunar_release"

  # Earth-centered radius of release state.
  r0_mag_km: 350000.0

  # Negative C3 means weakly Earth-bound/high-energy geocentric.
  C3_km2_s2: 0.0

  # Position direction near Earth-Moon line.
  # 0 deg means directly along Earth -> Moon.
  phi_r_deg: 0.0

  # Velocity lunar lead angle.
  # Positive means leading the Moon in the lunar-motion direction.
  phi_v_deg: 15.0

  # Optional out-of-plane tilts.
  out_of_plane_r_deg: 0.0
  out_of_plane_v_deg: 0.0

constraints:
  max_abs_phi_r_deg: 60.0
  min_phi_v_deg: -30.0
  max_phi_v_deg: 60.0
  max_abs_out_of_plane_v_deg: 15.0

propagation:
  enabled: true

  # Saved propagation cadence.
  step_days: 0.25

  # Use null to propagate all the way to the LPF target epoch.
  # Use e.g. 10.0 for a quick 10-day debugging propagation.
  debug_duration_days: null

  frame: "J2000"
  origin: "399"
  method: "DOP853"
  rtol: 1.0e-10
  atol: 1.0e-12

  bodies:
    - "10"
    - "1"
    - "2"
    - "399"
    - "4"
    - "5"
    - "6"
    - "7"
    - "8"
    - "301"

visualization:
  departure_geometry:
    enabled: true
    show_plot: true
    save_plot: false
    filename: "tli_departure_geometry.png"

  propagated_trajectory:
    enabled: true
    show_plot: true
    save_plot: false
    filename: "ballistic_tli_propagation.png"

output:
  save_state_json: true
  save_state_csv: true
  save_trajectory_csv: true
  save_propagation_summary_json: true