# ==============================================================================
# transfer_tli_departure_config.yaml
# ------------------------------------------------------------------------------
# Unified configuration for the TLI/cislunar-release transfer workflow.
#
# Scripts currently supported by this file:
#   1) ballistic_release_sweep.py
#      - Builds many plausible cislunar/TLI-like release states.
#      - Propagates them ballistically.
#      - Saves ballistic proxy-cost ranking and representative trajectories.
#
#   2) optimize_mcc_from_ballistic_sweep.py
#      - Reads the ballistic sweep summary.
#      - Optimizes a two-burn sequence: MCC + arrival/acquisition.
#
#   3) optimize_four_burn_from_ballistic_sweep.py
#      - Reads the ballistic sweep summary.
#      - Optimizes a four-burn sequence: TCM-1, TCM-2, TCM-3, ACQ.
#
#   4) optimize_four_burn_with_dispersion.py
#      - Either behaves like script 3 using ballistic-summary mode, or
#      - Generates Gaussian dispersed initial states about a nominal optimized
#        trajectory and optimizes the four-burn sequence for each dispersed case.
#
# Notes:
#   - States are Earth-centered J2000/EME unless otherwise noted.
#   - Position units are km; velocity units are km/s unless otherwise noted.
#   - Set show_plot: false when running on a headless cluster.
# ==============================================================================



# ==============================================================================
# MPI / WALLTIME SETTINGS
# Used by: transfer_optimize_4tcm_from_ballistic_sweep_w_dispersion_mpi.py
# ------------------------------------------------------------------------------
# progress_every:
#   Number of local optimization cases between progress messages.
#
# save_rank_outputs:
#   If true, each rank writes its completed local records to a unique CSV under
#   four_burn_optimization.output_dir/rank_outputs/. This is useful for checking
#   what each rank completed, but it is not a full resume/checkpoint system.
#
# walltime_hours:
#   The walltime requested from the scheduler. Set to null to disable the
#   walltime save/stop check.
#
# save_before_walltime_minutes:
#   Before starting each new case, the script checks elapsed wallclock time.
#   Once this buffer is reached, it stops starting new cases, gathers completed
#   records, writes a partial summary/metadata, and exits cleanly.
#
# max_optimization_minutes:
#   Per-case optimization wallclock limit. If a least_squares solve exceeds this
#   limit, the residual raises a timeout exception, the case is marked as failed,
#   and the rank moves on to the next case. Set to null or <=0 to disable.
#   The timeout is checked between residual evaluations; a single long propagator
#   call cannot be interrupted until it returns.
# ==============================================================================
mpi:
  progress_every: 1
  save_rank_outputs: true

runtime:
  walltime_hours: 72.0
  save_before_walltime_minutes: 45.0
  max_optimization_minutes: 30.0


# ==============================================================================
# SPICE KERNELS
# Used by: all scripts
# ------------------------------------------------------------------------------
# Kernels loaded through spiceypy. Ensure paths are valid relative to where the
# script is run, or replace with absolute paths.
# ==============================================================================
spice:
  kernels:
    - "naif0012.tls"        # Leapseconds kernel; required for UTC/ET conversion.
    - "de430.bsp"           # Planetary ephemeris used by the n-body propagator.


# ==============================================================================
# FILE LOCATIONS
# Used by: all scripts
# ------------------------------------------------------------------------------
# constants_yaml:
#   Constants file used by NBodyPropagator, e.g. G, KM_TO_M, body masses.
#
# lpf_orbit_csv:
#   Reference LPF/quasi-halo trajectory CSV. The target row is selected below.
#
# output_dir:
#   Primary output directory used by ballistic_release_sweep.py. The optimization
#   scripts use their own output directories in their script-specific blocks.
# ==============================================================================
files:
  constants_yaml: "constants.yaml"
  lpf_orbit_csv: "LPF_orbit_2.csv"
  output_dir: "results/transfer_results/ballistic_sweep_output_mpi"


# ==============================================================================
# TARGET STATE
# Used by: all scripts
# ------------------------------------------------------------------------------
# target_index:
#   Row index in LPF_orbit_csv used as the target quasi-halo state.
#
# time_column:
#   UTC-like time column in LPF_orbit_csv. The scripts convert this to JDTDB.
#
# state_columns_geo_eme:
#   Columns defining the 6D Earth-centered EME/J2000 target state.
# ==============================================================================
target:
  target_index: 140000
  time_column: "Time"
  state_columns_geo_eme:
    - "GEO_EME_X_(km)"
    - "GEO_EME_Y_(km)"
    - "GEO_EME_Z_(km)"
    - "GEO_EME_Vx_(km/s)"
    - "GEO_EME_Vy_(km/s)"
    - "GEO_EME_Vz_(km/s)"


# ==============================================================================
# TRANSFER EPOCH / TIME OF FLIGHT
# Used by: all scripts
# ------------------------------------------------------------------------------
# tof_days:
#   Transfer duration. Departure epoch is computed as:
#       t_departure = t_target - tof_days
# ==============================================================================
epoch:
  tof_days: 90.0


# ==============================================================================
# N-BODY PROPAGATION SETTINGS
# Used by: all scripts
# ------------------------------------------------------------------------------
# step_days:
#   Output sampling step for saved/visualized trajectories. The integrator still
#   adapts internally.
#
# debug_duration_days:
#   If null, propagate to the target epoch. If set to e.g. 10.0, scripts may run
#   a shortened propagation for quick debugging where implemented.
#
# frame/origin/bodies:
#   Passed into NBodyPropagator. Origin 399 = Earth. Bodies are NAIF IDs.
# ==============================================================================
propagation:
  enabled: true
  step_days: 0.5
  debug_duration_days: null

  frame: "J2000"
  origin: "399"
  method: "DOP853"
  rtol: 1.0e-10
  atol: 1.0e-12

  bodies:
    - "10"     # Sun
    - "1"      # Mercury barycenter
    - "2"      # Venus barycenter
    - "399"    # Earth
    - "4"      # Mars barycenter
    - "5"      # Jupiter barycenter
    - "6"      # Saturn barycenter
    - "7"      # Uranus barycenter
    - "8"      # Neptune barycenter
    - "301"    # Moon


# ==============================================================================
# BALLISTIC RELEASE SWEEP
# Used by: ballistic_release_sweep.py only
# ------------------------------------------------------------------------------
# This block defines the broad cislunar/TLI-like release-state design-space sweep.
# It is not an injection dispersion model. It is used to identify viable delivery
# geometries before maneuver optimization.
#
# mode:
#   grid   = use np.linspace(min,max,n) for each parameter and take Cartesian product.
#   random = draw n_random independent uniform samples over each parameter range.
#
# r0_mag_km:
#   Geocentric release radius magnitude.
#
# C3_km2_s2:
#   Geocentric characteristic energy at release. Negative values are bound but
#   may still represent high-energy cislunar delivery states.
#
# phi_r_deg:
#   Position angle offset from Earth-Moon line in the Earth-Moon plane.
#
# phi_v_deg:
#   Velocity lead angle in the Earth-Moon plane.
#
# out_of_plane_*:
#   Out-of-plane offsets relative to the Earth-Moon plane.
# ==============================================================================
sweep:
  enabled: true
  mode: "grid"

  n_random: 200
  random_seed: 7

  r0_mag_km:
    min: 150000.0
    max: 350000.0
    n: 3

  C3_km2_s2:
    min: -3.0
    max: -0.5
    n: 3

  phi_r_deg:
    min: -45.0
    max: 45.0
    n: 3

  phi_v_deg:
    min: -10.0
    max: 45.0
    n: 3

  out_of_plane_r_deg:
    min: 0.0
    max: 0.0
    n: 1

  out_of_plane_v_deg:
    min: -10.0
    max: 10.0
    n: 1


# ==============================================================================
# BALLISTIC PROXY COST
# Used by: ballistic_release_sweep.py only
# ------------------------------------------------------------------------------
# This cost ranks ballistic cases before maneuver optimization. It is NOT the
# actual transfer ΔV. The actual ΔV comes from the optimization scripts.
#
# J approx = ||final position miss|| / r_error_scale
#          + ||final velocity miss|| / v_error_scale
#          + optional plausibility penalties
# ==============================================================================
cost:
  r_error_scale_km: 1000000.0
  v_error_scale_kms: 1.0

  C3_reference_km2_s2: -2.0
  C3_weight: 0.0

  min_moon_distance_soft_km: 10000.0
  moon_close_penalty_weight: 10.0

  min_earth_distance_soft_km: 50000.0
  earth_close_penalty_weight: 5.0


# ==============================================================================
# TWO-BURN OPTIMIZATION: MCC + ARRIVAL/ACQUISITION
# Used by: optimize_mcc_from_ballistic_sweep.py only
# ------------------------------------------------------------------------------
# Reads ballistic_release_sweep_summary.csv and optimizes only selected rows.
#
# run_mode options:
#   all                 = optimize every successful ballistic case.
#   top_n               = optimize top_n cases by ranking_column.
#   selected_sample_ids = optimize listed sample IDs.
#   random_n            = optimize random_n cases.
#   percentile_cases    = optimize cases nearest specified proxy-cost percentiles.
#   cost_threshold      = optimize cases with ranking_column <= max_proxy_cost.
# ==============================================================================
maneuver_optimization:
  enabled: false

  input_summary_csv: "results/transfer_results/transfer_90d/ballistic_sweep_output_mpi/ballistic_release_sweep_summary.csv"
  output_dir: "results/transfer_results/maneuver_optimization_output"

  run_mode: "percentile_cases"
  top_n: 25
  selected_sample_ids:
    - 0
  random_n: 50
  random_seed: 11
  percentiles:
    - 0
  max_proxy_cost: 10.0

  require_ballistic_status_ok: true
  ranking_column: "proxy_cost"
  ascending: true


# ==============================================================================
# FOUR-BURN OPTIMIZATION / DISPERSION MODE
# Used by:
#   - optimize_four_burn_from_ballistic_sweep.py
#   - optimize_four_burn_with_dispersion.py
# ------------------------------------------------------------------------------
# input_mode:
#   ballistic_summary = optimize cases selected from ballistic sweep summary.
#   dispersion        = select a nominal optimized case, perturb its initial state,
#                       and optimize each dispersed initial state.
#
# nominal_optimized_summary_csv:
#   Used only by optimize_four_burn_with_dispersion.py when input_mode=dispersion.
# ==============================================================================
four_burn_optimization:
  enabled: true

  input_mode: "dispersion"  # Change to "dispersion" for dispersion study.

  input_summary_csv: "results/transfer_results/transfer_90d/ballistic_sweep_output_mpi/ballistic_release_sweep_summary.csv"
  nominal_optimized_summary_csv: "results/transfer_results/transfer_90d/four_burn_dispersion_output_mpi/four_burn_optimized_sweep_summary.csv"
  output_dir: "results/transfer_results/four_burn_dispersion_output_mpi_sample881015"

  run_mode: "percentile_cases"
  top_n: 25
  selected_sample_ids:
    - 0
  random_n: 50
  random_seed: 11
  percentiles:
    - 0
    - 25
    - 75
    - 100
  max_proxy_cost: 10.0

  require_ballistic_status_ok: true
  ranking_column: "proxy_cost"
  ascending: true


# ==============================================================================
# NOMINAL CASE SELECTION FOR DISPERSION STUDY
# Used by: optimize_four_burn_with_dispersion.py only, when input_mode=dispersion
# ------------------------------------------------------------------------------
# selection options:
#   best_dv   = use successful optimized case with lowest dv_total_mps.
#   median_dv = use successful optimized case closest to median dv_total_mps.
#   sample_id = use a specific sample_id.
# ==============================================================================
nominal_case:
  selection: "sample_id"
  sample_id: 881015
  require_target_success: true


# ==============================================================================
# LOCAL INJECTION DISPERSION MODEL
# Used by: optimize_four_burn_with_dispersion.py only, when input_mode=dispersion
# ------------------------------------------------------------------------------
# This is a local Gaussian perturbation model about a nominal optimized release
# state. It should be interpreted separately from the broad TLI design-space sweep.
#
# frame:
#   rtn   = perturb in radial, along-track, cross-track axes of nominal state.
#   j2000 = perturb directly in Earth-centered J2000 components.
#
# position_sigma_km:
#   1-sigma position perturbations. For rtn: x=R, y=T, z=N.
#
# velocity_sigma_mps:
#   1-sigma velocity perturbations. Values are in m/s and converted to km/s.
#
# clip_sigma:
#   Optional component-wise clipping of Gaussian draws. null = no clipping.
# ==============================================================================
dispersion:
  enabled: true
  n_samples: 100
  random_seed: 42
  frame: "rtn"

  position_sigma_km:
    x: 10.0
    y: 50.0
    z: 10.0

  velocity_sigma_mps:
    x: 1.0
    y: 5.0
    z: 1.0

  clip_sigma: 3.0


# ==============================================================================
# MANEUVER MODEL
# Used by:
#   - optimize_mcc_from_ballistic_sweep.py
#   - optimize_four_burn_from_ballistic_sweep.py
#   - optimize_four_burn_with_dispersion.py
# ------------------------------------------------------------------------------
# Two-burn script uses:
#   mcc_fraction, dv_component_bound_kms, initial_guess_kms
#
# Four-burn scripts use:
#   sequence entries below
#
# For four-burn scripts:
#   fraction = burn time as fraction of total transfer duration.
#   dv_component_bound_kms = per-axis bound on that burn component.
#   dv_weight = only used if include_per_maneuver_dv_penalty=true.
# ==============================================================================
maneuvers:
  # --- Two-burn script settings ---
  mcc_fraction: 0.35
  dv_component_bound_kms: 2.0
  initial_guess_kms: 0.0

  # --- Four-burn script settings ---
  sequence:
    - name: "TCM-1"
      label: "Injection clean-up"
      enabled: true
      fraction: 0.02
      dv_component_bound_kms: 0.30
      initial_guess_kms: 0.0
      dv_weight: 0.5

    - name: "TCM-2"
      label: "Early transfer correction"
      enabled: true
      fraction: 0.10
      dv_component_bound_kms: 0.30
      initial_guess_kms: 0.0
      dv_weight: 0.7

    - name: "TCM-3"
      label: "Mid-course correction"
      enabled: true
      fraction: 0.50
      dv_component_bound_kms: 0.50
      initial_guess_kms: 0.0
      dv_weight: 1.0

    - name: "ACQ"
      label: "Quasi-halo acquisition + trim"
      enabled: true
      fraction: 1.00
      dv_component_bound_kms: 1.00
      initial_guess_kms: 0.0
      dv_weight: 1.0


# ==============================================================================
# OPTIMIZER SETTINGS
# Used by:
#   - optimize_mcc_from_ballistic_sweep.py
#   - optimize_four_burn_from_ballistic_sweep.py
#   - optimize_four_burn_with_dispersion.py
# ------------------------------------------------------------------------------
# r_scale_km / v_scale_kms:
#   Scale terminal position/velocity residuals. Smaller scale makes target error
#   more important. Current values are tight: 1000 km and 1 m/s.
#
# include_dv_penalty:
#   Used by the two-burn script. Usually keep false for grid-point ranking: hit
#   the target first, then rank successful cases by dv_total_mps.
#
# include_per_maneuver_dv_penalty / include_total_dv_penalty:
#   Used by four-burn scripts. Keep false initially. If enabled, larger
#   dv_scale_kms means weaker ΔV penalty.
# ==============================================================================
optimization:
  max_nfev: 300
  xtol: 1.0e-10
  ftol: 1.0e-10
  gtol: 1.0e-10

  r_scale_km: 1000.0
  v_scale_kms: 0.001

  # Two-burn penalty toggle.
  include_dv_penalty: false

  # Four-burn penalty toggles.
  include_per_maneuver_dv_penalty: false
  include_total_dv_penalty: false

  # Larger scale = weaker penalty, smaller scale = stronger penalty.
  dv_scale_kms: 5.0
  total_dv_scale_kms: 5.0

  success_position_tol_km: 1000.0
  success_velocity_tol_mps: 1.0


# ==============================================================================
# VISUALIZATION SETTINGS
# Used by: corresponding scripts as noted in each subsection
# ------------------------------------------------------------------------------
# show_plot:
#   Display interactive matplotlib windows. Set false on cluster/headless runs.
# save_plot:
#   Save figures to the relevant output directory.
# ==============================================================================
visualization:
  # Used by: ballistic_release_sweep.py
  sweep_endpoints:
    enabled: true
    show_plot: false
    save_plot: true
    filename: "ballistic_sweep_endpoints.png"
    marker_size: 15
    best_marker_size: 90
    average_marker_size: 90

  # Used by: ballistic_release_sweep.py
  representative_trajectories:
    enabled: true
    show_plot: false
    save_plot: true
    filename: "ballistic_sweep_representative_trajectories.png"
    include_best: true
    include_average: true

  # Used by: optimize_mcc_from_ballistic_sweep.py
  optimized_representative_trajectories:
    enabled: true
    show_plot: false
    save_plot: true
    filename: "optimized_representative_trajectories.png"
    include_best_dv: true
    include_median_dv: true
    include_worst_dv: false

  # Used by:
  #   - optimize_four_burn_from_ballistic_sweep.py
  #   - optimize_four_burn_with_dispersion.py
  four_burn_representative_trajectories:
    enabled: true
    show_plot: false
    save_plot: true
    filename: "four_burn_representative_trajectories.png"

    include_best_dv: true
    include_median_dv: true
    include_worst_dv: false

    save_staged_plots: false
    show_staged_plots: false


# ==============================================================================
# OUTPUT TOGGLES
# Used by: corresponding scripts as noted
# ------------------------------------------------------------------------------
# These toggles control whether CSV/JSON products are written. Output paths are
# defined in files.output_dir, maneuver_optimization.output_dir, and
# four_burn_optimization.output_dir.
# ==============================================================================
output:
  # Used by: ballistic_release_sweep.py
  save_summary_csv: true
  save_summary_json: true
  save_best_trajectory_csv: true
  save_average_trajectory_csv: true

  # Used by: optimize_mcc_from_ballistic_sweep.py
  save_optimization_summary_csv: true
  save_optimization_metadata_json: true

  # Used by: optimize_four_burn_from_ballistic_sweep.py and optimize_four_burn_with_dispersion.py
  save_four_burn_summary_csv: true
  save_four_burn_metadata_json: true
  save_representative_trajectories: true
