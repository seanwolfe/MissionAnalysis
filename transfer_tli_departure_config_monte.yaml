# tli_departure_config.yaml

spice:
  kernels:
    - "naif0012.tls"
    - "de430.bsp"

files:
  constants_yaml: "constants.yaml"
  lpf_orbit_csv: "LPF_orbit_2.csv"
  output_dir: "transfer/ballistic_sweep_output"

target:
  target_index: 140000
  time_column: "Time"
  state_columns_geo_eme:
    - "GEO_EME_X_(km)"
    - "GEO_EME_Y_(km)"
    - "GEO_EME_Z_(km)"
    - "GEO_EME_Vx_(km/s)"
    - "GEO_EME_Vy_(km/s)"
    - "GEO_EME_Vz_(km/s)"

epoch:
  tof_days: 90.0

propagation:
  enabled: true
  step_days: 0.5

  # Use null to propagate to target epoch.
  # Use e.g. 10.0 for quick debugging.
  debug_duration_days: null

  frame: "J2000"
  origin: "399"
  method: "DOP853"
  rtol: 1.0e-10
  atol: 1.0e-12

  bodies:
    - "10"
    - "1"
    - "2"
    - "399"
    - "4"
    - "5"
    - "6"
    - "7"
    - "8"
    - "301"

sweep:
  enabled: true
  mode: "grid"   # "grid" or "random"

  # Only used if mode = random.
  n_random: 200
  random_seed: 7

  # Release radius [km]
  r0_mag_km:
    min: 150000.0
    max: 350000.0
    n: 3

  # Geocentric C3 [km^2/s^2]
  C3_km2_s2:
    min: -3.0
    max: -0.5
    n: 3

  # Position angle from Earth-Moon line [deg]
  phi_r_deg:
    min: -45.0
    max: 45.0
    n: 3

  # Velocity lead angle [deg]
  phi_v_deg:
    min: -10.0
    max: 45.0
    n: 3

  # Out-of-plane position angle [deg]
  out_of_plane_r_deg:
    min: 0.0
    max: 0.0
    n: 1

  # Out-of-plane velocity angle [deg]
  out_of_plane_v_deg:
    min: -10.0
    max: 10.0
    n: 1

cost:
  # Proxy cost for ranking ballistic cases.
  #
  # This is not actual maneuver ΔV yet. It is a heuristic ranking metric:
  #
  #   J = ||dr_f|| / r_scale + ||dv_f|| / v_scale
  #       + penalties for implausible geometry
  #
  # Later, the actual cost should come from optimized MCC + insertion ΔV.

  r_error_scale_km: 1000000.0
  v_error_scale_kms: 1.0

  # Penalize large C3 deviations if desired.
  # Leave weight 0.0 if C3 is already sampled intentionally.
  C3_reference_km2_s2: -2.0
  C3_weight: 0.0

  # Penalize very close Moon approaches.
  min_moon_distance_soft_km: 10000.0
  moon_close_penalty_weight: 10.0

  # Penalize Earth return / close Earth approach.
  min_earth_distance_soft_km: 50000.0
  earth_close_penalty_weight: 5.0

visualization:
  sweep_endpoints:
    enabled: true
    show_plot: true
    save_plot: true
    filename: "ballistic_sweep_endpoints.png"

    # Plot in Earth-centered J2000 coordinates.
    # Points are final propagated states.
    marker_size: 15
    best_marker_size: 90
    average_marker_size: 90

  representative_trajectories:
    enabled: true
    show_plot: true
    save_plot: true
    filename: "ballistic_sweep_representative_trajectories.png"

    # Saves/plots only best and average trajectories to avoid clutter.
    include_best: true
    include_average: true

  optimized_representative_trajectories:
    enabled: true
    show_plot: true
    save_plot: true
    filename: "optimized_representative_trajectories.png"

    # Which optimized cases to plot.
    # Options:
    #   best_dv
    #   median_dv
    #   worst_dv
    include_best_dv: true
    include_median_dv: true
    include_worst_dv: false

  four_burn_representative_trajectories:
    enabled: true
    show_plot: true
    save_plot: true
    filename: "four_burn_representative_trajectories.png"

    # Which optimized cases to plot.
    include_best_dv: true
    include_median_dv: true
    include_worst_dv: false

    # For each representative case, also generate staged trajectory plot:
    #   no burns
    #   TCM-1 only
    #   TCM-1 + TCM-2
    #   TCM-1 + TCM-2 + TCM-3
    #   TCM-1 + TCM-2 + TCM-3 + ACQ
    save_staged_plots: true
    show_staged_plots: true

output:
  save_summary_csv: true
  save_summary_json: true
  save_best_trajectory_csv: true
  save_average_trajectory_csv: true
  save_optimization_summary_csv: true
  save_optimization_metadata_json: true
  save_representative_trajectories: true
  save_four_burn_summary_csv: true
  save_four_burn_metadata_json: true


###################
# maneuver optimization
###################

maneuver_optimization:
  enabled: true

  input_summary_csv: "transfer/ballistic_sweep_output/ballistic_release_sweep_summary.csv"
  output_dir: "transfer/maneuver_optimization_output"

  # Which ballistic cases to optimize:
  #   all
  #   top_n
  #   selected_sample_ids
  #   random_n
  #   percentile_cases
  #   cost_threshold
  run_mode: "percentile_cases"

  # Used when run_mode = top_n
  top_n: 25

  # Used when run_mode = selected_sample_ids
  selected_sample_ids:
    - 0

  # Used when run_mode = random_n
  random_n: 50
  random_seed: 11

  # Used when run_mode = percentile_cases
  # 0 = best proxy-cost case, 50 = median proxy-cost case, 100 = worst successful case
  percentiles:
    - 0

  # Used when run_mode = cost_threshold
  max_proxy_cost: 10.0

  require_ballistic_status_ok: true
  ranking_column: "proxy_cost"
  ascending: true

maneuvers:
  # Fixed MCC timing as a fraction of total transfer time.
  mcc_fraction: 0.35

  # Bounds on each maneuver component [km/s].
  # Example: 1.0 means each component can vary from -1 km/s to +1 km/s.
  dv_component_bound_kms: 2.0

  # Initial guess for all maneuver components [km/s].
  initial_guess_kms: 0.0

  sequence:
    - name: "TCM-1"
      label: "Injection clean-up"
      enabled: true
      fraction: 0.02
      dv_component_bound_kms: 0.30
      initial_guess_kms: 0.0
      dv_weight: 0.5

    - name: "TCM-2"
      label: "Early transfer correction"
      enabled: true
      fraction: 0.10
      dv_component_bound_kms: 0.30
      initial_guess_kms: 0.0
      dv_weight: 0.7

    - name: "TCM-3"
      label: "Mid-course correction"
      enabled: true
      fraction: 0.50
      dv_component_bound_kms: 0.50
      initial_guess_kms: 0.0
      dv_weight: 1.0

    - name: "ACQ"
      label: "Quasi-halo acquisition + trim"
      enabled: true
      fraction: 1.00
      dv_component_bound_kms: 1.00
      initial_guess_kms: 0.0
      dv_weight: 1.0

optimization:
  max_nfev: 300
  xtol: 1.0e-10
  ftol: 1.0e-10
  gtol: 1.0e-10

  # Residual scaling.
  r_scale_km: 1000.0
  v_scale_kms: 0.001
  dv_scale_kms: 1.0

  # If true, includes total ΔV as a soft residual term.
  include_dv_penalty: true

  # Optional regularization.
  include_per_maneuver_dv_penalty: false
  include_total_dv_penalty: false

  total_dv_scale_kms: 1.0

  # Optional validity thresholds for tagging success after optimization.
  success_position_tol_km: 1000.0
  success_velocity_tol_mps: 1.0


four_burn_optimization:
  enabled: true

  input_summary_csv: "transfer/ballistic_sweep_output/ballistic_release_sweep_summary.csv"
  output_dir: "transfer/four_burn_optimization_output"

  # Which ballistic cases to optimize:
  #   all
  #   top_n
  #   selected_sample_ids
  #   random_n
  #   percentile_cases
  #   cost_threshold
  run_mode: "percentile_cases"

  top_n: 25

  selected_sample_ids:
    - 0

  random_n: 50
  random_seed: 11

  percentiles:
    - 0

  max_proxy_cost: 10.0

  require_ballistic_status_ok: true
  ranking_column: "proxy_cost"
  ascending: true
